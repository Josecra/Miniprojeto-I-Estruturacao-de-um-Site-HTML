<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="stylesheet" href="./assets/stylecad.css">
</head>

<body>

    <img class="img" src="./imagens/d77500ad-404a-4b00-a4a3-4bb123248494.png" alt="">

    <div class="barra2">
    </div>

    <h1 class="incadastro">Cadastre-se na JMart</h1>
    <form action="/cadastro.html" method="post">
        <label class="incadastro" for="nome completo">Nome:</label>
        <input class="incadastro" type="text" required oninvalid="this.setCustomValidity('Digite seu nome')"
            oninput="this.setCustomValidity('')" name="nome completo" minlength="3" maxlength="20">

        <br><br>

        <label class="incadastro" for="email">Email:</label>
        <input class="incadastro" type="email" required name="email"
            oninvalid="this.setCustomValidity('Digite um email válido')" oninput="this.setCustomValidity('')"
            pattern="[@]">

        <br><br>

        <label class="incadastro" for="senha">Senha:</label>
        <input class="incadastro" type="password" required name="senha" pattern="[A-Za-z]-[0-9]"
            oninput="this.setCustomValidity('')">

        <br><br>

        <label class="incadastro" for="número de telefone">Número de telefone:</label>
        <input class="incadastro" type="tel" required name="número de telefone" pattern="[0-9]{3}-[0-9]{2}-[0-9]-{4}"
            oninvalid="this.setCustomValidity('Digite um número de telefone válido')"
            oninput="this.setCustomValidity('')">

        <br><br>

        <label class="incadastro" for="data de nascimento">Data de nascimento:</label>
        <input class="incadastro" type="date" required name="data de nascimento">

        <br><br>

        <label class="incadastro">CEP</label>
        <input class="incadastro" type="text" name="cep" pattern="[0-9]{5}-[0-9]{3}"
            oninvalid="this.setCustomValidity('Digite um CEP válido')" oninput="this.setCustomValidity('')">

        <label class="incadastro">Cidade:</label>
        <select class="incadastro" name="cidade" id="">
            <option value="1">São Roque do Canaã</option>
            <option value="2">Colatina</option>
            <option value="3">Guarapari</option>
            <option value="4">Linhares</option>
            <option value="5">Santa Teresa</option>
            <option value="6">Vitória</option>
            <option value="7">Vila Velha</option>
            <option value="8">Cariacica</option>
            <option value="9">Serra</option>
            <option value="10">Viana</option>
        </select>

        <br><br>

        <label class="incadastro">Sexo:</label>
        <input type="radio" name="sexo" value="M"> Masculino
        <input type="radio" name="sexo" value="F"> Feminino

        <br><br>

        <label class="incadastro">Interesses:</label>

        <br>

        <input type="checkbox" name="Interesses" value="Produtos de beleza"> Produtos de Beleza
        <input type="checkbox" name="Interesses" value="Tecnologia"> Tecnologia
        <input type="checkbox" name="Interesses" value="Moda"> Moda
        <br>
        <input type="checkbox" name="Interesses" value="Brinquedos">Brinquedos
        <input type="checkbox" name="Interesses" value="Acessórios Automotivos"> Acessórios Automotivos

        <br><br>

        <label class="incadastro">Comentários(Opcional):</label>
        <br><br>
        <textarea class="incadastro" name="mensagem" id="" cols="30" rows="10"></textarea>
        <br><br>
        <input class="incadastro" type="submit" name="enviar" value="Enviar" href="index.html">

    </form>
</body>

</html>
